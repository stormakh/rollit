<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rollit</title>
  </head>
  <body>
    <div id="app">
      <main class="shell">
        <section class="stage" aria-label="D20 roll area">
          <canvas id="dice"></canvas>
        </section>

        <section class="controls" aria-label="Roll controls">
          <div class="brand">
            <h1>Rollit</h1>
            <button class="settings-toggle" id="settingsToggle" type="button" aria-expanded="false" aria-controls="settingsPanel">
              ⚙
            </button>
          </div>

          <div class="target-panel" id="targetPanel">
            <button class="pick-btn" id="pickButton" type="button">
              <span class="pick-icon" aria-hidden="true">🎯</span>
              <span class="pick-label" id="pickLabel">Pick target</span>
            </button>
            <button class="clear-btn" id="clearTargetButton" type="button" hidden aria-label="Clear target">✕</button>
          </div>

          <button class="result" id="rollButton" type="button">
            <span class="value" id="rollValue" hidden></span>
            <span class="result-copy">
              <span class="status" id="rollStatus">Roll</span>
              <span class="hint" id="rollHint"></span>
            </span>
          </button>

          <div class="fields" id="settingsPanel" hidden>
            <label class="wide">
              <span>Dice</span>
              <select id="dicePreset">
                <option value="crimson">Crimson</option>
                <option value="blackGold" selected>Black & Gold</option>
                <option value="ivory">Ivory</option>
              </select>
            </label>
            <label class="wide">
              <span>Sound</span>
              <select id="soundPreset">
                <option value="arcade">Arcade</option>
                <option value="tabletop">Tabletop</option>
                <option value="mystic">Mystic</option>
              </select>
            </label>
            <label class="wide">
              <span>Roll Mode</span>
              <select id="rollMode">
                <option value="normal">Normal</option>
                <option value="advantage">Advantage</option>
                <option value="disadvantage">Disadvantage</option>
              </select>
            </label>
            <label>
              <span>DC</span>
              <input id="dc" type="number" min="1" max="30" value="10" />
            </label>
            <label>
              <span>Mod</span>
              <input id="modifier" type="number" min="-20" max="20" value="0" />
            </label>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
