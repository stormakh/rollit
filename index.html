<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rollit</title>
  </head>
  <body>
    <div id="app">
      <main class="shell">
        <section class="stage" aria-label="D20 roll area">
          <canvas id="dice"></canvas>
        </section>

        <section class="controls" aria-label="Roll controls">
          <div class="brand">
            <h1>Rollit</h1>
            <button class="settings-toggle" id="settingsToggle" type="button" aria-expanded="false" aria-controls="settingsPanel">
              ⚙
            </button>
          </div>

          <button class="result" id="rollButton" type="button">
            <span class="value" id="rollValue" hidden></span>
            <span class="result-copy">
              <span class="status" id="rollStatus">Roll</span>
              <span class="hint" id="rollHint"></span>
            </span>
          </button>

          <section class="situation-card" id="situationCard" aria-label="Situation difficulty">
            <label class="situation-label" for="situationInput">
              <span class="sr-only">Situation</span>
              <textarea id="situationInput" rows="1" placeholder="Describe situation, press Enter"></textarea>
            </label>
            <div class="difficulty-loader" id="difficultyLoader" hidden aria-live="polite">
              <span></span>
              <span></span>
              <span></span>
              <p>Choosing DC...</p>
            </div>
            <div class="situation-actions">
              <button id="chooseDifficulty" type="button">Choose DC</button>
              <p class="ai-difficulty" id="aiDifficulty"></p>
            </div>
          </section>

          <div class="fields" id="settingsPanel" hidden>
            <label class="wide">
              <span>Dice</span>
              <select id="dicePreset">
                <option value="crimson">Crimson</option>
                <option value="blackGold" selected>Black & Gold</option>
                <option value="ivory">Ivory</option>
              </select>
            </label>
            <label class="wide">
              <span>Sound</span>
              <select id="soundPreset">
                <option value="arcade">Arcade</option>
                <option value="tabletop">Tabletop</option>
                <option value="mystic">Mystic</option>
              </select>
            </label>
            <label class="wide">
              <span>Roll Mode</span>
              <select id="rollMode">
                <option value="normal">Normal</option>
                <option value="advantage">Advantage</option>
                <option value="disadvantage">Disadvantage</option>
              </select>
            </label>
            <label>
              <span>DC</span>
              <input id="dc" type="number" min="1" max="20" value="10" />
            </label>
            <label>
              <span>Mod</span>
              <input id="modifier" type="number" min="-20" max="20" value="0" />
            </label>
            <label class="wide">
              <span>OpenRouter Key</span>
              <input id="openRouterKey" type="password" placeholder="sk-or-v1-..." autocomplete="off" />
            </label>
            <div class="shortcut-setting">
              <span>Shortcut</span>
              <div class="shortcut-actions">
                <button id="captureShortcut" type="button">Capture now</button>
                <button id="shortcutSettings" type="button">Configure</button>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
